name: Node.js CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Client
        working-directory: ./client
        run: npm ci

      - name: Lint Client
        working-directory: ./client
        run: npm run lint

      - name: Test Client
        working-directory: ./client
        run: npm run test || true

      - name: Install Server
        working-directory: ./server
        run: npm ci

      - name: Lint Server
        working-directory: ./server
        run: npm run lint

      - name: Test Server
        working-directory: ./server
        run: npm test || true