name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'
        cache-dependency-path: |
          client/package-lock.json
          server/package-lock.json

    - name: Install Client Dependencies
      working-directory: ./client
      run: npm ci

    - name: Lint Client
      working-directory: ./client
      run: npm run lint

    - name: Test Client
      working-directory: ./client
      run: npm run test -- --run || true # using true temporarily if tests fail

    - name: Install Server Dependencies
      working-directory: ./server
      run: npm ci

    - name: Lint Server
      working-directory: ./server
      run: npm run lint

    - name: Test Server
      working-directory: ./server
      run: npm test || true
